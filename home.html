<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário Alimentar do Hotto</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="Header">
        <header class="navbar-simples"></header>
        <h1 id="titulo">Diário Alimentar do Hotto</h1>
    </div>

    <div class="main-container">
        <!-- Calendário / Seletor de Data -->
        <div class="calendar-container">
            <button class="cal-nav-btn" onclick="changeDate(-1)">&#9664;</button>
            <div class="date-display">
                <span id="current-date-label"></span>
                <input type="date" id="date-picker" onchange="loadDate(this.value)">
            </div>
            <button class="cal-nav-btn" onclick="changeDate(1)">&#9654;</button>
        </div>

        <!-- Relatório Nutricional -->
        <div class="report-container">
            <h2>📊 Relatório do Dia</h2>
            <div class="macros">
                <div class="macro-item">
                    <span class="macro-value" id="total-calories">0</span>
                    <span class="macro-label">Calorias</span>
                </div>
                <div class="macro-item carbs">
                    <span class="macro-value" id="total-carbs">0g</span>
                    <span class="macro-label">Carboidratos</span>
                </div>
                <div class="macro-item protein">
                    <span class="macro-value" id="total-protein">0g</span>
                    <span class="macro-label">Proteína</span>
                </div>
                <div class="macro-item fat">
                    <span class="macro-value" id="total-fat">0g</span>
                    <span class="macro-label">Gordura</span>
                </div>
            </div>
        </div>

        <!-- Seções de Refeições -->
        <div class="meals-container">
            <!-- Breakfast -->
            <div class="meal-section" id="breakfast-section">
                <div class="meal-header">
                    <h2>🍳 Breakfast</h2>
                    <button class="add-btn" onclick="openAddFood('breakfast')">+ Adicionar</button>
                </div>
                <ul class="food-list" id="breakfast-list"></ul>
            </div>

            <!-- Lunch -->
            <div class="meal-section" id="lunch-section">
                <div class="meal-header">
                    <h2>🍽️ Lunch</h2>
                    <button class="add-btn" onclick="openAddFood('lunch')">+ Adicionar</button>
                </div>
                <ul class="food-list" id="lunch-list"></ul>
            </div>

            <!-- Dinner -->
            <div class="meal-section" id="dinner-section">
                <div class="meal-header">
                    <h2>🌙 Dinner</h2>
                    <button class="add-btn" onclick="openAddFood('dinner')">+ Adicionar</button>
                </div>
                <ul class="food-list" id="dinner-list"></ul>
            </div>

            <!-- Snacks -->
            <div class="meal-section" id="snacks-section">
                <div class="meal-header">
                    <h2>🍎 Snacks</h2>
                    <button class="add-btn" onclick="openAddFood('snacks')">+ Adicionar</button>
                </div>
                <ul class="food-list" id="snacks-list"></ul>
            </div>
        </div>
    </div>

    <!-- Modal para adicionar comida -->
    <div class="modal" id="add-food-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>Adicionar Alimento</h3>
            <input type="text" id="food-search" placeholder="Pesquisar alimento...">
            <button onclick="searchFood()">Pesquisar</button>
            <div id="search-results"></div>
            
            <div class="manual-add">
                <h4>Ou adicione manualmente:</h4>
                <input type="text" id="food-name" placeholder="Nome do alimento">
                <input type="number" id="food-calories" placeholder="Calorias">
                <input type="number" id="food-carbs" placeholder="Carboidratos (g)">
                <input type="number" id="food-protein" placeholder="Proteína (g)">
                <input type="number" id="food-fat" placeholder="Gordura (g)">
                <button onclick="addFoodManual()">Adicionar</button>
            </div>
        </div>
    </div>

    <!-- Inserir quantidade de comida -->
    <div class="modal" id="quantity-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeQuantityModal()">&times;</span>
            <h3>Selecionar Quantidade</h3>
            <div id="quantity-food-info" class="quantity-food-info"></div>
            <label for="quantity-input" class="quantity-label">Quantidade (g):</label>
            <input type="number" id="quantity-input" placeholder="Ex: 150" min="1" step="1">
            <p class="quantity-preview" id="quantity-preview"></p>
            <button onclick="confirmQuantity()">Confirmar</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/app/addfood.js"></script>
</body>
</html>
